<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;

  background-color: #f7f7f7;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px),
    url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  background-size: 16px 16px, auto;
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 10%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25));
}

/* CONTAINER */
.container {
  padding: 20px 15px 40px;
  text-align: center;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  color: #2e2e2e;
  margin-top: 10px;
  margin-bottom: 10px;
}

/* CONTADOR */
.countdown {
  font-size: 14px;
  color: #444;
  margin-bottom: 10px;
  font-weight: 500;
}

/* ANIMAÇÃO */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* RETÂNGULO */
.time-box {
  display: inline-block;
  background: #1a0000;
  padding: 12px 18px;
  border-radius: 10px;
  margin-bottom: 15px;

  box-shadow: 0 0 10px rgba(211,47,47,0.4);

  animation: pulse 1.8s infinite ease-in-out;
}

/* TEXTO DIGITAL NEON */
.time-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: #ff4d4d;

  text-shadow:
    0 0 5px #ff4d4d,
    0 0 10px #ff4d4d,
    0 0 20px rgba(255, 0, 0, 0.6);
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  background: rgba(255,255,255,0.9);
  width: 130px;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: #333;
  border: 1px solid rgba(0,0,0,0.05);
}

/* FOTO */
.photo-section {
  margin-top: 18px;
  display: flex;
  justify-content: center;
}

.photo-button {
  background: white;
  padding: 12px 16px;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
  font-size: 13px;
  border: 1px solid rgba(0,0,0,0.05);
  width: 100%;
  max-width: 280px;
}

/* MOBILE */
@media (max-width: 600px) {
  .carousel { height: 220px; }
  h1 { font-size: 22px; }
  .card { width: 45%; }
  .time-text { font-size: 16px; }
}
</style>

</head>

<body>

<div class="carousel">
  <div class="overlay"></div>
  <img src="carrossel1.jpeg" class="active">
  <img src="carrossel2.jpeg">
  <img src="carrossel3.jpeg">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>

<div class="countdown">Faltam:</div>

<div id="contador" class="time-box"></div>

<div class="cards">
  <a href="sobre.html" class="card"><h3>Sobre</h3></a>
  <a href="presentes.html" class="card"><h3>Ideias</h3></a>
  <a href="info.html" class="card"><h3>Informações</h3></a>
</div>

<div class="photo-section">
  <a href="https://photos.app.goo.gl/AkPUaFz8rVMsXZFu5" target="_blank" class="photo-button">
    📷 Compartilhe os cliques da festa conosco
  </a>
</div>

</div>

<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);

/* CONTADOR */
function atualizarContagem() {
  const dataEvento = new Date(2026, 5, 4, 13, 0, 0);
  const agora = new Date();

  const diferenca = dataEvento - agora;

  if (diferenca <= 0) {
    document.getElementById("contador").innerHTML = "<span class='time-text'>É HOJE!!!</span>";
    return;
  }

  const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
  const segundos = Math.floor((diferenca / 1000) % 60);

  document.getElementById("contador").innerHTML =
    "<span class='time-text'>" +
    dias + "D : " +
    horas + "H : " +
    minutos + "M : " +
    segundos + "S" +
    "</span>";
}

setInterval(atualizarContagem, 1000);
atualizarContagem();
</script>

</body>
</html>
