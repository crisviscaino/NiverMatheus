<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100vw;
  height: 280px;
  overflow: hidden;
  margin-left: calc(-50vw + 50%);
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 10%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25));
}

/* CONTAINER */
.container {
  padding: 20px 15px 15px;
  text-align: center;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  color: #2e2e2e;
  margin-top: 8px;
  margin-bottom: 15px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  background: #e0e0e0;
  width: 130px;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: #333;
  transition: all 0.2s ease;
}

.card:hover {
  background: #d5d5d5;
  transform: translateY(-2px);
}

.card h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 500;
}

/* BOTÃO DE FOTO (NOVO ESTILO) */
.photo-section {
  margin-top: 18px;
}

.photo-button {
  display: inline-block;
  background: #ffffff;
  padding: 12px 18px;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
  font-size: 13px;

  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.05);

  max-width: 260px;
  width: 100%;
}

.photo-button:hover {
  transform: translateY(-2px);
}

/* MOBILE */
@media (max-width: 600px) {

  .carousel {
    height: 220px;
  }

  .carousel img {
    object-position: center top;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    width: 45%;
  }

  .photo-button {
    max-width: 100%;
  }
}

</style>

</head>

<body>

<div class="carousel">
  <div class="overlay"></div>

  <img src="carrossel1.jpeg" class="active">
  <img src="carrossel2.jpeg">
  <img src="carrossel3.jpeg">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>

<div class="cards">

<a href="sobre.html" class="card">
  <h3>Sobre</h3>
</a>

<a href="presentes.html" class="card">
  <h3>Ideias</h3>
</a>

<a href="info.html" class="card">
  <h3>Informações</h3>
</a>

</div>

<!-- BOTÃO DE FOTOS -->
<div class="photo-section">

  <a href="https://photos.app.goo.gl/AkPUaFz8rVMsXZFu5" target="_blank" class="photo-button">
    📸 Compartilhe os cliques da festa conosco
  </a>

</div>

</div>

<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
