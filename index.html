<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;

  /* FUNDO HQ */
  background-color: #f7f7f7;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px),
    url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  background-size: 16px 16px, auto;
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 10%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25));
}

/* CONTAINER */
.container {
  padding: 20px 15px 40px;
  text-align: center;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  color: #2e2e2e;
  margin-top: 10px;
  margin-bottom: 5px;
}

/* CONTADOR */
.countdown {
  font-size: 14px;
  color: #444;
  margin-bottom: 15px;
  font-weight: 500;
}

/* BADGE (APENAS NÚMERO) */
.badge {
  display: inline-block;
  background: #d32f2f;
  color: white;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 700;
  margin: 0 4px;

  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  background: rgba(255,255,255,0.9);
  width: 130px;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  color: #333;

  border: 1px solid rgba(0,0,0,0.05);
  transition: all 0.2s ease;
}

.card:hover {
  background: white;
  transform: translateY(-2px);
}

.card h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 500;
}

/* BOTÃO DE FOTO */
.photo-section {
  margin-top: 18px;
  display: flex;
  justify-content: center;
}

.photo-button {
  display: block;
  background: white;
  padding: 12px 16px;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
  font-size: 13px;

  border: 1px solid rgba(0,0,0,0.05);

  width: 100%;
  max-width: 280px;
  box-sizing: border-box;
}

/* MOBILE */
@media (max-width: 600px) {

  .carousel {
    height: 220px;
  }

  .carousel img {
    object-position: center top;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    width: 45%;
  }
}

</style>

</head>

<body>

<div class="carousel">
  <div class="overlay"></div>

  <img src="carrossel1.jpeg" class="active">
  <img src="carrossel2.jpeg">
  <img src="carrossel3.jpeg">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>

<p class="countdown">
  <span id="texto"></span>
  <span id="numero" class="badge"></span>
  <span id="resto"></span>
</p>

<div class="cards">

<a href="sobre.html" class="card">
  <h3>Sobre</h3>
</a>

<a href="presentes.html" class="card">
  <h3>Ideias</h3>
</a>

<a href="info.html" class="card">
  <h3>Informações</h3>
</a>

</div>

<div class="photo-section">

  <a href="https://photos.app.goo.gl/AkPUaFz8rVMsXZFu5" target="_blank" class="photo-button">
    📷 Compartilhe os cliques da festa conosco
  </a>

</div>

</div>

<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);

/* CONTADOR */
function atualizarContagem() {
  const dataEvento = new Date("2026-06-04T13:00:00");
  const hoje = new Date();

  const diferenca = dataEvento - hoje;

  const dias = Math.ceil(diferenca / (1000 * 60 * 60 * 24));

  const texto = document.getElementById("texto");
  const numero = document.getElementById("numero");
  const resto = document.getElementById("resto");

  if (dias > 1) {
    texto.innerText = "Faltam";
    numero.innerText = dias;
    resto.innerText = "dias para a missão";
  } else if (dias === 1) {
    texto.innerText = "Falta";
    numero.innerText = "1";
    resto.innerText = "dia para a missão";
  } else if (dias === 0) {
    texto.innerText = "";
    numero.innerText = "HOJE";
    resto.innerText = "";
  } else {
    texto.innerText = "";
    numero.innerText = "";
    resto.innerText = "A festa já aconteceu";
  }
}

atualizarContagem();
</script>

</body>
</html>
