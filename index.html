<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aniversário</title>

<!-- Ícones modernos -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: linear-gradient(135deg, #e3f2fd, #fce4ec);
}

.container {
  padding: 50px 20px;
}

h1 {
  margin-bottom: 10px;
  color: #333;
}

.subtitle {
  margin-bottom: 40px;
  color: #666;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 25px;
}

.card {
  background: white;
  width: 230px;
  padding: 30px 20px;
  border-radius: 20px;
  text-decoration: none;
  color: #333;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.icon {
  font-size: 38px;
  margin-bottom: 15px;
  color: #1976d2;
}

.card h3 {
  margin: 10px 0;
}

.card p {
  font-size: 14px;
  color: #777;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Aniversário do Matheus 🎉</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre o herói</h3>
  <p>Conheça mais sobre o aniversariante</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-gift"></i></div>
  <h3>Presentes</h3>
  <p>Ideias do que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Data, local e detalhes</p>
</a>

</div>

</div>

</body>
</html>
