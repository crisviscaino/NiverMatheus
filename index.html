<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aniversário</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100vw;
  height: 280px;
  overflow: hidden;
  margin-left: calc(-50vw + 50%);
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 10%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25));
}

/* CONTAINER */
.container {
  padding: 20px 15px 10px;
  text-align: center;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  color: #2e2e2e;
  margin-top: 8px;
  margin-bottom: 6px;
}

/* SUB */
.subtitle {
  margin-bottom: 15px;
  color: #666;
  font-size: 12px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  background: white;
  width: 130px;
  padding: 12px 8px;
  border-radius: 12px;
  text-decoration: none;
  color: #333;

  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
}

.icon {
  font-size: 18px;
  margin-bottom: 5px;
  color: #1565c0;
}

.card h3 {
  margin: 3px 0;
  font-size: 12px;
}

.card p {
  font-size: 10px;
  color: #777;
}

/* BOTÃO DE FOTOS */
.photo-section {
  margin-top: 20px;
}

.photo-button {
  display: inline-block;
  padding: 10px 16px;
  background: #1565c0;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.photo-button:hover {
  background: #0d47a1;
}

/* MOBILE */
@media (max-width: 600px) {

  .carousel {
    height: 220px;
  }

  .carousel img {
    object-position: center top;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    width: 45%;
  }
}

</style>

</head>

<body>

<div class="carousel">
  <div class="overlay"></div>

  <img src="carrossel1.jpeg" class="active">
  <img src="carrossel2.jpeg">
  <img src="carrossel3.jpeg">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre</h3>
  <p>Conheça mais</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-star"></i></div>
  <h3>Ideias</h3>
  <p>O que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Detalhes da festa</p>
</a>

</div>

<!-- SEÇÃO DE FOTOS -->
<div class="photo-section">

  <a href="https://photos.app.goo.gl/AkPUaFz8rVMsXZFu5" target="_blank" class="photo-button">
    📸 Compartilhe suas fotos conosco
  </a>

</div>

</div>

<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
