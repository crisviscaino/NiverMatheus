<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<!-- Ícones modernos -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;

  /* Fundo HQ suave */
  background:
    linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
    url('https://www.transparenttextures.com/patterns/comic-noise.png');
}

.container {
  padding: 40px 15px;
}

h1 {
  margin-bottom: 8px;
  font-size: 24px;
  color: #333;
  position: relative;
}

/* detalhe sutil estilo HQ no título */
h1::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: #1976d2;
  margin: 8px auto 0;
  border-radius: 10px;
}

.subtitle {
  margin-bottom: 30px;
  color: #777;
  font-size: 14px;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  background: white;
  width: 150px;
  padding: 16px 12px;
  border-radius: 16px;
  text-decoration: none;
  color: #333;

  /* sombra suave */
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);

  /* detalhe HQ sutil */
  border: 1px solid rgba(25,118,210,0.1);

  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  border-color: rgba(25,118,210,0.3);
}

.icon {
  font-size: 24px;
  margin-bottom: 8px;
  color: #1976d2;
}

.card h3 {
  margin: 5px 0;
  font-size: 14px;
}

.card p {
  font-size: 12px;
  color: #888;
}

/* micro detalhe estilo quadrinho nos cards */
.card::before {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: #1976d2;
  border-radius: 50%;
  top: 10px;
  left: 10px;
  opacity: 0.6;
}

.card {
  position: relative;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Aniversário de 6 Anos do Matheus🎉</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre</h3>
  <p>Conheça mais</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-star"></i></div>
  <h3>Ideias</h3>
  <p>O que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Detalhes da festa</p>
</a>

</div>

</div>

</body>
</html>
