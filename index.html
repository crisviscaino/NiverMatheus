<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<!-- Fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  text-align: center;

  background:
    linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),
    url('https://www.transparenttextures.com/patterns/comic-noise.png');
}

.container {
  padding: 50px 20px;
}

/* TÍTULO ELEGANTE */
h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 2px;
  color: #1a1a1a;
  margin-bottom: 10px;
}

/* detalhe minimalista sofisticado */
h1::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  background: linear-gradient(to right, #1976d2, #ef5350);
  margin: 12px auto 0;
  border-radius: 10px;
}

.subtitle {
  margin-bottom: 30px;
  color: #888;
  font-size: 13px;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 14px;
}

.card {
  position: relative;
  background: white;
  width: 145px;
  padding: 15px 10px;
  border-radius: 14px;
  text-decoration: none;
  color: #333;

  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.05);

  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.12);
}

.icon {
  font-size: 20px;
  margin-bottom: 6px;
  color: #1976d2;
}

.card h3 {
  margin: 4px 0;
  font-size: 13px;
  font-weight: 600;
}

.card p {
  font-size: 11px;
  color: #999;
}

/* detalhe sutil (quase imperceptível, mas elegante) */
.card::before {
  content: "";
  position: absolute;
  width: 3px;
  height: 3px;
  background: #1976d2;
  border-radius: 50%;
  top: 8px;
  left: 8px;
  opacity: 0.4;
}

</style>

</head>

<body>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre</h3>
  <p>Conheça mais</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-star"></i></div>
  <h3>Sugestões</h3>
  <p>O que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Detalhes da festa</p>
</a>

</div>

</div>

</body>
</html>
