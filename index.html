<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<!-- Ícones -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<!-- Fontes modernas -->
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  text-align: center;

  background:
    linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
    url('https://www.transparenttextures.com/patterns/comic-noise.png');
}

.container {
  padding: 40px 15px;
}

/* TÍTULO ESTILO MARVEL CLEAN */
h1 {
  font-family: 'Anton', sans-serif;
  font-size: 34px;
  letter-spacing: 1px;
  margin-bottom: 10px;
  color: #0d47a1;
}

/* detalhe minimalista */
h1::after {
  content: "";
  display: block;
  width: 50px;
  height: 3px;
  background: #1976d2;
  margin: 10px auto 0;
  border-radius: 10px;
}

.subtitle {
  margin-bottom: 30px;
  color: #777;
  font-size: 14px;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  position: relative;
  background: white;
  width: 150px;
  padding: 16px 12px;
  border-radius: 16px;
  text-decoration: none;
  color: #333;

  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  border: 1px solid rgba(25,118,210,0.1);

  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  border-color: rgba(25,118,210,0.3);
}

.icon {
  font-size: 22px;
  margin-bottom: 8px;
  color: #1976d2;
}

.card h3 {
  margin: 5px 0;
  font-size: 14px;
  font-weight: 600;
}

.card p {
  font-size: 12px;
  color: #888;
}

/* detalhe HQ sutil */
.card::before {
  content: "";
  position: absolute;
  width: 5px;
  height: 5px;
  background: #1976d2;
  border-radius: 50%;
  top: 10px;
  left: 10px;
  opacity: 0.5;
}

</style>

</head>

<body>

<div class="container">

<h1>ANIVERSÁRIO DO Matheus</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre</h3>
  <p>Conheça mais</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-star"></i></div>
  <h3>Sugestões</h3>
  <p>O que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Detalhes da festa</p>
</a>

</div>

</div>

</body>
</html>
