<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  text-align: center;
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100vw;
  height: 280px;
  overflow: hidden;
  margin-left: calc(-50vw + 50%);
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 10%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25));
}

/* CONTAINER */
.container {
  padding: 20px 15px 10px;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  color: #2e2e2e;
  margin-top: 8px;
  margin-bottom: 15px;
}

/* BOTÕES PADRÃO */
.buttons {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.button {
  padding: 10px 18px;
  background: #e0e0e0;
  color: #333;
  text-decoration: none;
  border-radius: 10px;
  font-size: 13px;
  transition: all 0.2s ease;
}

.button:hover {
  background: #d5d5d5;
}

/* SEÇÃO DE FOTOS */
.photo-section {
  margin-top: 15px;
}

/* MOBILE */
@media (max-width: 600px) {

  .carousel {
    height: 220px;
  }

  .carousel img {
    object-position: center top;
  }

  h1 {
    font-size: 22px;
  }

}

</style>

</head>

<body>

<!-- CARROSSEL -->
<div class="carousel">
  <div class="overlay"></div>

  <img src="carrossel1.jpeg" class="active">
  <img src="carrossel2.jpeg">
  <img src="carrossel3.jpeg">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>

<!-- BOTÕES -->
<div class="buttons">

  <a href="sobre.html" class="button">Sobre</a>
  <a href="presentes.html" class="button">Ideias</a>
  <a href="info.html" class="button">Informações</a>

</div>

<!-- BOTÃO DE FOTOS -->
<div class="photo-section">

  <a href="SEU_LINK_DO_ALBUM" target="_blank" class="button">
    📸 Compartilhe suas fotos conosco
  </a>

</div>

</div>

<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
