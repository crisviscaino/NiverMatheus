<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matheus</title>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  text-align: center;

  /* FUNDO MAIS VIVO */
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
}

/* CARROSSEL */
.carousel {
  position: relative;
  width: 100%;
  height: 220px;
  overflow: hidden;
}

.carousel img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.carousel img.active {
  opacity: 1;
}

/* SOBREPOSIÇÃO PARA DAR ESTILO */
.overlay {
  position: absolute;
  width: 100%;
  height: 220px;
  background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2));
}

/* CONTAINER */
.container {
  padding: 30px 20px;
}

/* TÍTULO */
h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 2px;
  color: white;
  margin-top: -40px;

  text-shadow: 2px 4px 10px rgba(0,0,0,0.4);
}

/* SUB */
.subtitle {
  margin-bottom: 25px;
  color: #555;
  font-size: 13px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 14px;
}

.card {
  background: white;
  width: 145px;
  padding: 15px 10px;
  border-radius: 14px;
  text-decoration: none;
  color: #333;

  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.icon {
  font-size: 20px;
  margin-bottom: 6px;
  color: #1565c0;
}

.card h3 {
  margin: 4px 0;
  font-size: 13px;
}

.card p {
  font-size: 11px;
  color: #777;
}

</style>

</head>

<body>

<!-- CARROSSEL -->
<div class="carousel">
  <div class="overlay"></div>

  <!-- TROCAR POR FOTOS DO SEU FILHO -->
  <img src="https://picsum.photos/800/300?1" class="active">
  <img src="https://picsum.photos/800/300?2">
  <img src="https://picsum.photos/800/300?3">
</div>

<div class="container">

<h1>ANIVERSÁRIO DO MATHEUS</h1>
<p class="subtitle">Escolha uma opção</p>

<div class="cards">

<a href="sobre.html" class="card">
  <div class="icon"><i class="fas fa-user-astronaut"></i></div>
  <h3>Sobre</h3>
  <p>Conheça mais</p>
</a>

<a href="presentes.html" class="card">
  <div class="icon"><i class="fas fa-star"></i></div>
  <h3>Ideias</h3>
  <p>O que ele ama</p>
</a>

<a href="info.html" class="card">
  <div class="icon"><i class="fas fa-calendar-alt"></i></div>
  <h3>Informações</h3>
  <p>Detalhes da festa</p>
</a>

</div>

</div>

<!-- SCRIPT DO CARROSSEL -->
<script>
let index = 0;
const images = document.querySelectorAll('.carousel img');

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
