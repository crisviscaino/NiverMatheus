<!DOCTYPE html>

<title>Informações</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  text-align: center;
}

.container {
  padding: 30px 20px;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  color: #2e2e2e;
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  max-width: 400px;
  margin: 0 auto 20px;
}

/* TEXTO */
.info-item {
  margin-bottom: 15px;
}

.label {
  font-weight: 600;
  font-size: 13px;
  color: #555;
}

.value {
  font-size: 15px;
  color: #222;
}

/* BOTÃO */
.button {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #1565c0;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 13px;
}

/* MAPA */
.map {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
}

/* VOLTAR */
.back {
  margin-top: 15px;
  display: inline-block;
  font-size: 13px;
  color: #1565c0;
  text-decoration: none;
}

</style>
