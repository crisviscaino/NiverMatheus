<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Informações</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;

  /* FUNDO HQ */
  background-color: #f7f7f7;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px),
    url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  background-size: 16px 16px, auto;

  text-align: center;
}

/* CONTAINER */
.container {
  padding: 30px 20px 40px;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  color: #222;
  margin-bottom: 20px;
}

/* CARD HQ */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  max-width: 420px;
  margin: 0 auto 20px;

  border: 2px solid #222;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: -6px;
  left: -6px;
  width: 100%;
  height: 100%;
  border: 2px solid rgba(0,0,0,0.15);
  border-radius: 14px;
  z-index: -1;
}

/* ITENS */
.info-item {
  margin-bottom: 15px;
}

.label {
  font-weight: 600;
  font-size: 13px;
  color: #555;
}

.value {
  font-size: 15px;
  color: #222;
}

/* BOTÕES */
.buttons {
  margin-top: 10px;
}

.button {
  display: inline-block;
  margin: 5px;
  padding: 10px 14px;
  background: #f0f0f0;
  color: #333;
  text-decoration: none;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid rgba(0,0,0,0.08);
}

.button:hover {
  background: #e6e6e6;
}

/* MAPA */
.map {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
}

/* VOLTAR (PADRÃO DO SITE) */
.back {
  display: inline-block;
  margin-top: 15px;
  font-size: 13px;
  color: #222;
  text-decoration: none;
  border-bottom: 1px solid #ccc;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    padding: 15px;
  }

  .map {
    height: 220px;
  }
}

</style>

</head>

<body>

<div class="container">

<h1>INFORMAÇÕES</h1>

<div class="card">

  <div class="info-item">
    <div class="label">Data</div>
    <div class="value">04/06/2026</div>
  </div>

  <div class="info-item">
    <div class="label">Horário</div>
    <div class="value">13h às 17h</div>
  </div>

  <div class="info-item">
    <div class="label">Local</div>
    <div class="value">Star Kids Buffet Unidade Maia - Avenida Suplicy, 539 - Guarulhos</div>
  </div>

  <!-- BOTÕES -->
  <div class="buttons">

    <a href="https://www.google.com/maps?q=Star+Kids+Buffet+Unidade+Maia" target="_blank" class="button">
      Google Maps
    </a>

    <!-- WAZE CORRIGIDO -->
    <a href="https://waze.com/ul?q=Star+Kids+Buffet+Unidade+Maia+Guarulhos&navigate=yes" target="_blank" class="button">
      Waze
    </a>

  </div>

  <!-- MAPA -->
  <iframe
    class="map"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3660.337714696774!2d-46.542037890670834!3d-23.448279757356378!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x465eb9d4dab7e487%3A0x8a7b1d793587a6e!2sStar%20Kids%20Buffet%20Unidade%20Maia!5e0!3m2!1spt-BR!2sbr!4v1776954024471!5m2!1spt-BR!2sbr"
    loading="lazy">
  </iframe>

</div>

<a href="index.html" class="back">Voltar</a>

</div>

</body>
</html>
