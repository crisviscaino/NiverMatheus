<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Informações</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;

  background-color: #f7f7f7;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px),
    url('https://www.transparenttextures.com/patterns/paper-fibers.png');

  text-align: center;
}

.container {
  padding: 30px 20px 40px;
}

h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  color: #222;
  margin-bottom: 20px;
}

/* CARD HQ */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  max-width: 420px;
  margin: 0 auto 20px;

  border: 2px solid #222;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: -6px;
  left: -6px;
  width: 100%;
  height: 100%;
  border: 2px solid rgba(0,0,0,0.15);
  border-radius: 14px;
  z-index: -1;
}

/* ITENS */
.info-item {
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-align: left;
}

.icon {
  width: 18px;
  height: 18px;
  fill: #333;
}

.label {
  font-weight: 600;
  font-size: 13px;
  color: #555;
}

.value {
  font-size: 15px;
  color: #222;
}

/* TEXTO BLOCO */
.text-group {
  display: flex;
  flex-direction: column;
}

/* BOTÕES */
.buttons {
  margin-top: 10px;
}

.button {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  margin: 5px;
  padding: 10px 14px;
  background: #f0f0f0;
  color: #333;
  text-decoration: none;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid rgba(0,0,0,0.08);
}

.button:hover {
  background: #e6e6e6;
}

.icon-btn {
  width: 18px;
  height: 18px;
}

/* MAPA */
.map {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
}

/* VOLTAR */
.back {
  display: inline-block;
  margin-top: 15px;
  font-size: 13px;
  color: #222;
  text-decoration: none;
  border-bottom: 1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<h1>INFORMAÇÕES</h1>

<div class="card">

  <!-- DATA -->
  <div class="info-item">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M7 2v2H5a2 2 0 0 0-2 2v2h18V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zm14 8H3v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10z"/>
    </svg>
    <div class="text-group">
      <div class="label">Data</div>
      <div class="value">04/06/2026</div>
    </div>
  </div>

  <!-- HORÁRIO -->
  <div class="info-item">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 1a11 11 0 1 0 0 22 11 11 0 0 0 0-22zm1 11V6h-2v8h6v-2h-4z"/>
    </svg>
    <div class="text-group">
      <div class="label">Horário</div>
      <div class="value">13h às 17h</div>
    </div>
  </div>

  <!-- LOCAL -->
  <div class="info-item">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/>
    </svg>
    <div class="text-group">
      <div class="label">Local</div>
      <div class="value">Star Kids Buffet Unidade Maia - Avenida Suplicy, 539 - Guarulhos</div>
    </div>
  </div>

  <div class="buttons">

    <a href="https://www.google.com/maps?q=Star+Kids+Buffet+Unidade+Maia" target="_blank" class="button">
      <img src="https://cdn.simpleicons.org/googlemaps" class="icon-btn">
      Google Maps
    </a>

    <a href="https://waze.com/ul?q=Star+Kids+Buffet+Unidade+Maia+Guarulhos&navigate=yes" target="_blank" class="button">
      <img src="https://cdn.simpleicons.org/waze" class="icon-btn">
      Waze
    </a>

  </div>

  <iframe
    class="map"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3660.337714696774!2d-46.542037890670834!3d-23.448279757356378!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x465eb9d4dab7e487%3A0x8a7b1d793587a6e!2sStar%20Kids%20Buffet%20Unidade%20Maia!5e0!3m2!1spt-BR!2sbr!4v1776954024471!5m2!1spt-BR!2sbr">
  </iframe>

</div>

<a href="index.html" class="back">Voltar</a>

</div>

</body>
</html>
