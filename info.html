<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Informações</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  text-align: center;
}

/* CONTAINER */
.container {
  padding: 30px 20px;
}

/* TÍTULO */
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  color: #2e2e2e;
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  max-width: 420px;
  margin: 0 auto 20px;
}

/* ITENS */
.info-item {
  margin-bottom: 15px;
}

.label {
  font-weight: 600;
  font-size: 13px;
  color: #555;
}

.value {
  font-size: 15px;
  color: #222;
}

/* BOTÕES */
.buttons {
  margin-top: 10px;
}

.button {
  display: inline-block;
  margin: 5px;
  padding: 10px 15px;
  background: #1565c0;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 13px;
}

.button.waze {
  background: #00c853;
}

/* MAPA */
.map {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
}

/* VOLTAR */
.back {
  margin-top: 15px;
  display: inline-block;
  font-size: 13px;
  color: #1565c0;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    padding: 15px;
  }

  .map {
    height: 220px;
  }
}

</style>

</head>

<body>

<div class="container">

<h1>INFORMAÇÕES</h1>

<div class="card">

  <div class="info-item">
    <div class="label">📅 Data</div>
    <div class="value">04/06/2026</div>
  </div>

  <div class="info-item">
    <div class="label">⏰ Horário</div>
    <div class="value">13h às 17h</div>
  </div>

  <div class="info-item">
    <div class="label">📍 Local</div>
    <div class="value">Star Kids Buffet Unidade Maia - Avenida Suplicy, 539 - Guarulhos</div>
  </div>

  <!-- BOTÕES -->
  <div class="buttons">

    <!-- GOOGLE MAPS -->
    <a href="https://www.google.com/maps?q=Star+Kids+Buffet+Unidade+Maia" target="_blank" class="button">
      Abrir no Google Maps
    </a>

    <!-- WAZE -->
    <a href="https://waze.com/ul?ll=-23.448279757356378,-46.542037890670834&navigate=yes" target="_blank" class="button waze">
      Abrir no Waze
    </a>

  </div>

  <!-- MAPA EMBUTIDO -->
  <iframe
    class="map"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3660.337714696774!2d-46.542037890670834!3d-23.448279757356378!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x465eb9d4dab7e487%3A0x8a7b1d793587a6e!2sStar%20Kids%20Buffet%20Unidade%20Maia!5e0!3m2!1spt-BR!2sbr!4v1776954024471!5m2!1spt-BR!2sbr"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

</div>

<a href="index.html" class="back">⬅ Voltar</a>

</div>

</body>
</html>
